<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>노래방 번호검색</title>
<meta name="description" content="TJ미디어·금영 노래방 곡번호 검색, 최신곡, 인기차트, 7080 명곡">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222633;
    --text: #e8eaf0;
    --text-dim: #9aa0b0;
    --accent: #7c5cff;
    --tj: #4d9fff;
    --ky: #ff7043;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px; }

  header {
    text-align: center;
    padding: 24px 0 6px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  header h1 .mic { font-size: 1.3rem; margin-right: 6px; }
  header p { color: var(--text-dim); font-size: 0.82rem; margin-top: 4px; }

  /* 화면(뷰) 탭 */
  .view-tabs {
    display: flex;
    gap: 4px;
    margin: 16px 0 4px;
    border-bottom: 1.5px solid #2c3140;
  }
  .view-tabs button {
    flex: 1;
    padding: 11px 0 10px;
    border: none;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .view-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 브랜드 선택 탭 */
  .brand-tabs {
    display: flex;
    gap: 8px;
    margin: 14px 0 10px;
  }
  .brand-tabs button {
    flex: 1;
    padding: 9px 0;
    border: 1.5px solid #2c3140;
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text-dim);
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .brand-tabs button.active[data-brand="all"] { border-color: var(--accent); color: var(--accent); background: rgba(124,92,255,.1); }
  .brand-tabs button.active[data-brand="tj"]  { border-color: var(--tj); color: var(--tj); background: rgba(77,159,255,.1); }
  .brand-tabs button.active[data-brand="kumyoung"] { border-color: var(--ky); color: var(--ky); background: rgba(255,112,67,.1); }

  /* 검색 영역 */
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .search-box input {
    flex: 1;
    min-width: 0;
    padding: 14px 16px;
    border: 1.5px solid #2c3140;
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text);
    font-size: 1.05rem;
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: #5a6070; }
  .search-box button {
    padding: 0 20px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .search-box button:active { transform: scale(.97); }

  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .mode-toggle button {
    padding: 7px 16px;
    border: 1px solid #2c3140;
    border-radius: 999px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .mode-toggle button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* 상태 메시지 */
  .status {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 0;
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .status .big { font-size: 2.2rem; display: block; margin-bottom: 8px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2c3140;
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 40px auto;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 결과 카드 */
  .result-count {
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-bottom: 10px;
  }
  .group-title {
    font-size: 0.95rem;
    font-weight: 800;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-title.tj { color: var(--tj); }
  .group-title.kumyoung { color: var(--ky); }
  .group-title small { color: var(--text-dim); font-weight: 500; font-size: 0.75rem; }
  .song {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: background .15s;
  }
  .song:active { background: var(--card-hover); }
  .song .rank {
    min-width: 26px;
    text-align: center;
    color: var(--text-dim);
    font-weight: 800;
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
  }
  .song .rank.top3 { color: #ffd54f; }
  .song .no {
    min-width: 76px;
    text-align: center;
    padding: 9px 6px;
    border-radius: 10px;
    font-size: 1.2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    cursor: pointer;
  }
  .song .no.tj { background: rgba(77,159,255,.14); color: var(--tj); }
  .song .no.kumyoung { background: rgba(255,112,67,.14); color: var(--ky); }
  .song .no small { display: block; font-size: 0.62rem; font-weight: 700; opacity: .8; margin-bottom: 2px; letter-spacing: .05em; }
  .song .no-col { display: flex; flex-direction: column; gap: 4px; }
  .song .no-col .no { padding: 5px 6px; font-size: 1.02rem; }
  .song .no-col .no small { display: inline; margin-right: 5px; font-size: 0.6rem; }
  .song .no.none { background: #232734; color: #5a6070; font-size: 0.8rem; padding: 8px 6px; cursor: default; }
  .song .info { flex: 1; min-width: 0; }
  .song .title {
    font-weight: 700;
    font-size: 0.97rem;
    line-height: 1.35;
    word-break: keep-all;
    overflow-wrap: anywhere;
  }
  .song .singer {
    color: var(--text-dim);
    font-size: 0.84rem;
    margin-top: 3px;
    overflow-wrap: anywhere;
  }
  .song .release { color: #5a6070; font-size: 0.72rem; margin-top: 3px; }
  .song .fav-btn {
    border: none;
    background: transparent;
    color: #3a4050;
    font-size: 1.4rem;
    line-height: 1;
    padding: 6px 2px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .song .fav-btn.on { color: #ffd54f; }

  /* 복사 토스트 */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #fff;
    padding: 11px 22px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 700;
    opacity: 0;
    transition: all .25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer {
    text-align: center;
    color: #4a5060;
    font-size: 0.72rem;
    margin-top: 30px;
    line-height: 1.6;
  }
  .hidden { display: none !important; }
</style>

  <header>
    <h1><span class="mic">🎤</span>노래방 번호검색</h1>
    <p>TJ미디어 · 금영 곡번호를 한 번에</p>

</div>

<script>
(function () {
  const API = 'https://api.manana.kr/karaoke';
  const $query = document.getElementById('query');
  const $results = document.getElementById('results');
  const $toast = document.getElementById('toast');
  const $searchArea = document.getElementById('searchArea');

  let view = 'search';   // search | new | chart | 7080 | fav
  let brand = 'all';     // all | tj | kumyoung
  let mode = 'song';     // song | singer
  let searchSeq = 0;     // 늦게 도착한 이전 요청 무시용
  const listCache = {};  // 신곡/인기 응답 캐시 (view+brand 별)

  // 즐겨찾기 — 이 기기(브라우저)에만 저장
  let favs = [];
  try { favs = JSON.parse(localStorage.getItem('krk_fav_v1') || '[]'); } catch { favs = []; }
  function persistFavs() { localStorage.setItem('krk_fav_v1', JSON.stringify(favs)); }
  function findFav(d) { return favs.findIndex(x => (d.tj && x.tj === d.tj) || (d.ky && x.ky === d.ky)); }

  const BRAND_LABEL = { tj: 'TJ', kumyoung: '금영' };
  const GROUP_TITLE = {
    new:   { tj: 'TJ 이달의 신곡', kumyoung: '금영 최신곡' },
    chart: { tj: 'TJ 인기순위 TOP100', kumyoung: '금영 인기차트' },
  };

  // ── 탭/토글 ──────────────────────────────
  document.getElementById('viewTabs').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    view = btn.dataset.view;
    document.querySelectorAll('#viewTabs button').forEach(b => b.classList.toggle('active', b === btn));
    $searchArea.classList.toggle('hidden', view !== 'search');
    refreshView();
  });

  document.getElementById('brandTabs').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    brand = btn.dataset.brand;
    document.querySelectorAll('#brandTabs button').forEach(b => b.classList.toggle('active', b === btn));
    refreshView();
  });

  document.getElementById('modeToggle').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    mode = btn.dataset.mode;
    document.querySelectorAll('#modeToggle button').forEach(b => b.classList.toggle('active', b === btn));
    $query.placeholder = mode === 'song' ? '곡명을 입력하세요' : '가수명을 입력하세요';
    if ($query.value.trim()) doSearch();
  });

  document.getElementById('searchBtn').addEventListener('click', doSearch);
  $query.addEventListener('keydown', e => { if (e.key === 'Enter') { $query.blur(); doSearch(); } });

  function refreshView() {
    if (view === 'search') {
      if ($query.value.trim()) doSearch();
      else $results.innerHTML = '<div class="status"><span class="big">🎵</span>부르고 싶은 노래를 검색해 보세요<br>번호를 누르면 복사됩니다</div>';
    } else if (view === '7080') {
      render7080();
    } else if (view === 'fav') {
      renderFav();
    } else {
      loadList(view);
    }
  }

  // ── 검색 ────────────────────────────────
  // 1순위: 자체 프록시(/api/search) — TJ미디어·kysing.kr 공식 데이터
  // 2순위: 프록시 접속 불가 시(로컬 파일로 열었을 때 등) manana.kr 직접 호출
  async function doSearch() {
    const q = $query.value.trim();
    if (!q) return;
    const seq = ++searchSeq;
    $results.innerHTML = '<div class="spinner"></div>';

    try {
      const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&mode=${mode}&brand=${brand}`);
      if (!r.ok) throw new Error('proxy ' + r.status);
      const data = await r.json();
      if (seq !== searchSeq || view !== 'search') return;
      const songs = data.results.flatMap(x => x.songs);
      const official = data.results.some(x => x.source === 'official');
      renderSongs(songs, q, official ? '공식 데이터' : '보조 데이터');
      return;
    } catch { /* 프록시 불가 → manana 직접 */ }

    const brands = brand === 'all' ? ['tj', 'kumyoung'] : [brand];
    try {
      const lists = await Promise.all(brands.map(b =>
        fetch(`${API}/${mode}/${encodeURIComponent(q)}/${b}.json`)
          .then(r => r.ok ? r.json() : [])
          .then(d => Array.isArray(d) ? d : [])
          .catch(() => [])
      ));
      if (seq !== searchSeq || view !== 'search') return;
      renderSongs(lists.flat(), q, '보조 데이터');
    } catch {
      if (seq !== searchSeq || view !== 'search') return;
      $results.innerHTML = '<div class="status"><span class="big">⚠️</span>검색 중 오류가 발생했습니다<br>네트워크 상태를 확인해 주세요</div>';
    }
  }

  // ── 신곡 / 인기 ─────────────────────────
  async function loadList(type) {
    const key = type + ':' + brand;
    const seq = ++searchSeq;
    if (listCache[key]) { renderList(type, listCache[key]); return; }
    $results.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await fetch(`/api/list?type=${type}&brand=${brand}`);
      if (!r.ok) throw new Error('list ' + r.status);
      const data = await r.json();
      if (seq !== searchSeq || view !== type) return;
      listCache[key] = data;
      renderList(type, data);
    } catch {
      if (seq !== searchSeq || view !== type) return;
      $results.innerHTML = '<div class="status"><span class="big">⚠️</span>목록을 불러오지 못했습니다<br>잠시 후 다시 시도해 주세요</div>';
    }
  }

  function renderList(type, data) {
    let html = '';
    let total = 0;
    for (const res of data.results) {
      if (!res.songs.length) continue;
      total += res.songs.length;
      const gt = GROUP_TITLE[type][res.brand];
      html += `<div class="group-title ${res.brand}">${gt} <small>${res.songs.length}곡</small></div>`;
      html += res.songs.map((s, i) => songCard(s, type === 'chart' ? i + 1 : null)).join('');
    }
    if (!total) {
      $results.innerHTML = '<div class="status"><span class="big">🙁</span>목록을 불러오지 못했습니다<br>잠시 후 다시 시도해 주세요</div>';
      return;
    }
    $results.innerHTML = html;
  }

  // ── 7080 / 즐겨찾기 (듀얼 번호 행) ─────────
  function dualRow(s) {
    let badges;
    if (brand === 'all') {
      badges = '<div class="no-col">' +
        (s.tj ? `<div class="no tj" data-copy="${s.tj}" data-b="TJ"><small>TJ</small>${s.tj}</div>` : '<div class="no none">TJ 없음</div>') +
        (s.ky ? `<div class="no kumyoung" data-copy="${s.ky}" data-b="금영"><small>금영</small>${s.ky}</div>` : '<div class="no none">금영 없음</div>') +
        '</div>';
    } else {
      const no = brand === 'tj' ? s.tj : s.ky;
      const cls = brand === 'tj' ? 'tj' : 'kumyoung';
      badges = `<div class="no ${cls}" data-copy="${no}" data-b="${BRAND_LABEL[brand]}"><small>${BRAND_LABEL[brand]}</small>${no}</div>`;
    }
    return `<div class="song">${badges}<div class="info"><div class="title">${escapeHtml(s.t)}</div><div class="singer">${escapeHtml(s.a)}</div></div>${favBtn({ t: s.t, a: s.a, tj: s.tj || null, ky: s.ky || null })}</div>`;
  }

  function render7080() {
    const items = SONGS_7080.filter(s =>
      brand === 'all' ? (s.tj || s.ky) : (brand === 'tj' ? s.tj : s.ky));
    if (!items.length) {
      $results.innerHTML = '<div class="status"><span class="big">🙁</span>표시할 곡이 없습니다</div>';
      return;
    }
    let html = `<div class="result-count">7080 명곡 ${items.length}곡 · 발표순</div>`;
    html += items.map(dualRow).join('');
    $results.innerHTML = html;
  }

  function renderFav() {
    let items = favs;
    if (brand === 'tj') items = items.filter(s => s.tj);
    if (brand === 'kumyoung') items = items.filter(s => s.ky);
    if (!items.length) {
      $results.innerHTML = '<div class="status"><span class="big">⭐</span>아직 즐겨찾기한 곡이 없어요<br>곡 옆의 별표(☆)를 눌러 저장해 보세요</div>';
      return;
    }
    let html = `<div class="result-count">즐겨찾기 ${items.length}곡 · 이 기기에만 저장됩니다</div>`;
    html += items.map(dualRow).join('');
    $results.innerHTML = html;
  }

  // ── 공통 렌더 ────────────────────────────
  function favBtn(d) {
    const on = findFav(d) >= 0;
    return `<button class="fav-btn${on ? ' on' : ''}" data-fav="${escapeHtml(JSON.stringify(d))}" aria-label="즐겨찾기">${on ? '★' : '☆'}</button>`;
  }

  function songCard(s, rank) {
    const bc = s.brand === 'tj' ? 'tj' : 'kumyoung';
    const bn = BRAND_LABEL[s.brand] || s.brand;
    const rk = rank ? `<div class="rank${rank <= 3 ? ' top3' : ''}">${rank}</div>` : '';
    const d = { t: s.title, a: s.singer, tj: s.brand === 'tj' ? s.no : null, ky: s.brand === 'kumyoung' ? s.no : null };
    return `<div class="song">${rk}
      <div class="no ${bc}" data-copy="${escapeHtml(s.no)}" data-b="${bn}"><small>${bn}</small>${escapeHtml(s.no)}</div>
      <div class="info">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="singer">${escapeHtml(s.singer)}</div>
        ${s.release && s.release !== '0000-00-00' ? `<div class="release">${escapeHtml(s.release)}</div>` : ''}
      </div>
      ${favBtn(d)}
    </div>`;
  }

  function renderSongs(songs, q, source) {
    if (!songs.length) {
      $results.innerHTML = `<div class="status"><span class="big">🙁</span>‘${escapeHtml(q)}’ 검색 결과가 없어요<br>띄어쓰기를 바꾸거나 일부만 입력해 보세요</div>`;
      return;
    }
    const html = songs.map(s => songCard(s, null)).join('');
    $results.innerHTML = `<div class="result-count">${songs.length}곡${source ? ' · ' + escapeHtml(source) : ''}</div>` + html;
  }

  // 별표 → 즐겨찾기 토글 / 번호 탭 → 클립보드 복사
  $results.addEventListener('click', e => {
    const fb = e.target.closest('.fav-btn');
    if (fb) {
      let d;
      try { d = JSON.parse(fb.dataset.fav); } catch { return; }
      const idx = findFav(d);
      let on;
      if (idx >= 0) { favs.splice(idx, 1); on = false; }
      else { favs.unshift(d); on = true; }
      persistFavs();
      if (view === 'fav') renderFav();
      else { fb.classList.toggle('on', on); fb.textContent = on ? '★' : '☆'; }
      showToast(on ? '⭐ 즐겨찾기에 추가됨' : '즐겨찾기에서 제거됨');
      return;
    }
    const badge = e.target.closest('[data-copy]');
    if (!badge) return;
    const no = badge.dataset.copy;
    const bn = badge.dataset.b;
    const copy = navigator.clipboard
      ? navigator.clipboard.writeText(no)
      : Promise.reject();
    copy.then(() => showToast(`${bn} ${no} 복사됨`))
        .catch(() => showToast(`${bn} ${no}`));
  });

  let toastTimer;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('show'), 1600);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
